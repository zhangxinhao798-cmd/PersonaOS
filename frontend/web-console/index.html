<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>PersonaOS</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section id="welcomeExperience" class="welcome-experience" aria-labelledby="welcomeTitle">
      <div class="welcome-inner">
        <header class="welcome-header">
          <span class="brand-mark" aria-hidden="true">P</span>
          <span data-i18n="app.name"></span>
        </header>
        <div class="welcome-copy">
          <p class="eyebrow" data-i18n="welcome.eyebrow"></p>
          <h1 id="welcomeTitle" data-i18n="welcome.title"></h1>
          <p data-i18n="welcome.description"></p>
        </div>
        <dl class="concept-grid">
          <div><dt data-i18n="welcome.concepts.digital_mind.name"></dt><dd data-i18n="welcome.concepts.digital_mind.description"></dd></div>
          <div><dt data-i18n="welcome.concepts.persona.name"></dt><dd data-i18n="welcome.concepts.persona.description"></dd></div>
          <div><dt data-i18n="welcome.concepts.memory.name"></dt><dd data-i18n="welcome.concepts.memory.description"></dd></div>
          <div><dt data-i18n="welcome.concepts.skills.name"></dt><dd data-i18n="welcome.concepts.skills.description"></dd></div>
          <div><dt data-i18n="welcome.concepts.evolution.name"></dt><dd data-i18n="welcome.concepts.evolution.description"></dd></div>
        </dl>
        <div class="welcome-actions">
          <button id="dismissWelcome" class="primary-action" type="button" data-i18n="welcome.continue"></button>
          <p data-i18n="welcome.local_note"></p>
        </div>
      </div>
    </section>

    <main class="shell">
      <aside class="sidebar" aria-label="Persona and session controls">
        <header class="brand">
          <span class="brand-mark" aria-hidden="true">P</span>
          <div>
            <h1 data-i18n="app.name"></h1>
            <p data-i18n="app.version"></p>
          </div>
        </header>

        <section class="setup-section" aria-labelledby="personaHeading">
          <div class="section-heading">
            <div>
              <span class="step">01</span>
              <h2 id="personaHeading" data-i18n="setup.persona"></h2>
            </div>
            <button id="reloadPersonas" class="icon-button" type="button" data-i18n-title="setup.reload" data-i18n-aria-label="setup.reload">↻</button>
          </div>
          <label class="sr-only" for="personaSelect" data-i18n="persona.label"></label>
          <select id="personaSelect"></select>
          <div id="personaGallery" class="persona-gallery" aria-live="polite"></div>
        </section>

        <section class="setup-section" aria-labelledby="relationshipHeading">
          <div class="section-heading">
            <div>
              <span class="step">02</span>
              <h2 id="relationshipHeading" data-i18n="setup.relationship"></h2>
            </div>
          </div>
          <label class="sr-only" for="relationshipSelect" data-i18n="relationship.label"></label>
          <select id="relationshipSelect" class="sr-only">
            <option value="assistant" data-i18n="relationship.types.assistant.name"></option>
            <option value="mentor" data-i18n="relationship.types.mentor.name"></option>
            <option value="companion" data-i18n="relationship.types.companion.name"></option>
            <option value="analyst" data-i18n="relationship.types.analyst.name"></option>
          </select>
          <div id="relationshipGallery" class="relationship-gallery"></div>
          <div class="relationship-detail">
            <p id="relationshipDescription" class="supporting-copy"></p>
            <p><strong data-i18n="relationship.works_well_for"></strong>: <span id="relationshipScenario"></span></p>
          </div>
        </section>

        <section class="setup-section compact" aria-labelledby="languageHeading">
          <div class="section-heading">
            <div>
              <span class="step">03</span>
              <h2 id="languageHeading" data-i18n="setup.language"></h2>
            </div>
          </div>
          <label class="sr-only" for="languageSelect" data-i18n="language.label"></label>
          <select id="languageSelect">
            <option value="zh-CN" data-i18n="language.zh_CN"></option>
            <option value="en-US" data-i18n="language.en_US" disabled></option>
          </select>
        </section>

        <details class="connection-settings">
          <summary data-i18n="setup.connection"></summary>
          <label for="apiBase" data-i18n="setup.api_base"></label>
          <input id="apiBase" value="http://127.0.0.1:8000" />
        </details>

        <button id="newSession" class="primary-action" type="button" data-i18n="setup.start"></button>
      </aside>

      <section class="experience">
        <header class="experience-header">
          <div>
            <p class="eyebrow" data-i18n="app.eyebrow"></p>
            <h2 id="chatTitle"></h2>
            <p id="notice"></p>
          </div>
          <div class="header-actions">
            <button id="showWelcome" type="button" data-i18n="chat.about"></button>
            <button id="loadHistory" type="button" data-i18n="chat.history"></button>
          </div>
        </header>

        <section class="persona-experience" aria-label="Persona experience card">
          <div class="identity-avatar" id="personaAvatar" aria-hidden="true">P</div>
          <div class="identity-copy">
            <div class="identity-title">
              <h3 id="personaName"></h3>
              <span class="status-pill" id="personaVersion"></span>
            </div>
            <p id="personaDescription"></p>
            <div class="persona-profile-details">
              <div><span data-i18n="persona.style"></span><p id="personaStyle"></p></div>
              <div><span data-i18n="persona.traits"></span><div id="personaTraits" class="trait-list"></div></div>
              <div><span data-i18n="persona.scenarios"></span><ul id="personaScenarios"></ul></div>
            </div>
          </div>
          <dl class="experience-facts">
            <div>
              <dt data-i18n="relationship.label"></dt>
              <dd id="relationshipType"></dd>
            </div>
            <div>
              <dt data-i18n="session.label"></dt>
              <dd id="sessionStatus"></dd>
            </div>
          </dl>
        </section>

        <section id="sessionSummary" class="session-summary" hidden aria-label="Current experience summary">
          <div class="summary-title">
            <span class="step" data-i18n="session.current"></span>
            <strong data-i18n="session.ready"></strong>
          </div>
          <dl>
            <div><dt data-i18n="session.persona"></dt><dd id="summaryPersona"></dd></div>
            <div><dt data-i18n="session.relationship"></dt><dd id="summaryRelationship"></dd></div>
            <div><dt data-i18n="session.language"></dt><dd id="summaryLanguage"></dd></div>
            <div><dt data-i18n="session.memory"></dt><dd data-i18n="session.memory_scope"></dd></div>
          </dl>
          <p data-i18n="session.memory_note"></p>
        </section>

        <div id="messages" class="messages" aria-live="polite">
          <section class="empty-state" id="emptyState">
            <span class="empty-mark" aria-hidden="true">P</span>
            <h3 data-i18n="chat.empty_title"></h3>
            <p data-i18n="chat.empty_description"></p>
          </section>
        </div>

        <form id="messageForm" class="composer">
          <input id="messageInput" autocomplete="off" data-i18n-placeholder="chat.placeholder" />
          <button id="sendMessage" type="submit" data-i18n="chat.send" data-i18n-aria-label="chat.send"></button>
        </form>
      </section>
    </main>

    <script src="./app.js"></script>
  </body>
</html>
